replicaCount: 1

image:
  repository: us-east1-docker.pkg.dev/cinemates-497209/cinemates-backend/backend
  pullPolicy: IfNotPresent
  # Defaults to .Chart.AppVersion when left empty.
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

containerPorts:
  - name: http
    containerPort: 8000
    protocol: TCP


# The backend exposes no "/" route, so health is checked at the TCP layer.
livenessProbe:
  tcpSocket:
    port: http
readinessProbe:
  tcpSocket:
    port: http

service:
  type: ClusterIP
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
